name: "my-check-out"
description: "my proxy of calling actions/checkout"
inputs:
  path:
    description: "path to checkout"
    required: false
  persist-credentials:
    description: "保持 GITHUB_TOKEN，用于后续 git push"
    default: true
    required: false

runs:
  using: "composite"
  steps:
    - name: check out with checkout
      uses: actions/checkout@v6
      with:
        path: ${{ inputs.path }}
        persist-credentials: ${{ inputs.persist-credentials }}
