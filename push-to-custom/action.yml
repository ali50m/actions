name: "push to custom repo"
description: "push to custom git repository"

inputs:
  remote_user:
    description: "remote username"
    required: true
  remote_host:
    description: "remote host"
    required: true
  remote_port:
    description: "remote ssh port"
    required: true
  remote_path:
    description: "remote repository path (should start with /)"
    required: true
  ssh_key:
    description: "ssh private key (supports ed25519, keep the newlines in the key)"
    required: true
  branch:
    description: "branch to push (defaults to current branch)"
    required: false
    default: ${GITHUB_REF##*/}

runs:
  using: "composite"
  steps:
    - name: push to custom repo
      run: |
        set -e
        set -o pipefail  # Ensure pipeline errors are caught
        
        cleanup() {
          echo "Cleaning up..."
          git remote remove destination 2>/dev/null || true
          rm -f ~/.ssh/id_ed25519 ~/.ssh/config ~/.ssh/known_hosts
        }
        
        trap cleanup EXIT  # Ensure cleanup runs on exit
        
        echo "Starting push to custom repository action..."
        
        # Validate inputs
        echo "Validating inputs..."
        if [[ ! "${{ inputs.remote_path }}" =~ ^/ ]]; then
          echo "Error: remote_path must start with /"
          exit 1
        fi
        
        # Validate port number
        echo "Validating port number..."
        if ! [[ "${{ inputs.remote_port }}" =~ ^[0-9]+$ ]] || \
           [ "${{ inputs.remote_port }}" -lt 1 ] || \
           [ "${{ inputs.remote_port }}" -gt 65535 ]; then
          echo "Error: Invalid port number"
          exit 1
        fi
        
        echo "Fetching repository history..."
        # Only do unshallow if repository is shallow
        if git rev-parse --is-shallow-repository &>/dev/null; then
          git fetch --unshallow || true
        fi
        
        echo "Setting up SSH configuration..."
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        
        # Write SSH key while preserving newlines but removing carriage returns
        echo -n "${{ inputs.ssh_key }}" | tr -d '\r' > ~/.ssh/id_ed25519
        
        # Validate SSH key format and content
        echo "Validating SSH key format..."
        if ! grep -q "BEGIN OPENSSH PRIVATE KEY" ~/.ssh/id_ed25519; then
          echo "Error: SSH key must start with '-----BEGIN OPENSSH PRIVATE KEY-----'"
          exit 1
        fi
        
        if ! grep -q "END OPENSSH PRIVATE KEY" ~/.ssh/id_ed25519; then
          echo "Error: SSH key must end with '-----END OPENSSH PRIVATE KEY-----'"
          exit 1
        fi
        
        if ! ssh-keygen -l -f ~/.ssh/id_ed25519 &>/dev/null; then
          echo "Error: Invalid SSH private key format"
          echo "Please ensure the key is in OpenSSH format and includes all content"
          exit 1
        fi
        
        # Set strict permissions
        chmod 600 ~/.ssh/id_ed25519
        
        # Create SSH config file with more secure defaults
        cat > ~/.ssh/config << 'EOL'
        Host *
            StrictHostKeyChecking yes
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            BatchMode yes
            KexAlgorithms sntrup761x25519-sha512@openssh.com,curve25519-sha256,curve25519-sha256@libssh.org
            HostKeyAlgorithms ssh-ed25519,rsa-sha2-512,rsa-sha2-256
            Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com
            MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com
        EOL
        chmod 600 ~/.ssh/config
        
        echo "Adding remote host to known hosts..."
        ssh-keyscan -p ${{ inputs.remote_port }} ${{ inputs.remote_host }} >> ~/.ssh/known_hosts || {
          echo "Error: Failed to scan remote host key"
          exit 1
        }
        chmod 600 ~/.ssh/known_hosts
        
        # Test SSH connection with more verbose output
        echo "Testing SSH connection..."
        if ! ssh -v -p ${{ inputs.remote_port }} \
          -i ~/.ssh/id_ed25519 \
          ${{ inputs.remote_user }}@${{ inputs.remote_host }} exit 2>&1; then
          
          echo "Error: Failed to establish SSH connection"
          echo "Trying to diagnose the issue..."
          
          echo "Checking SSH key fingerprint:"
          ssh-keygen -l -f ~/.ssh/id_ed25519 || true
          
          echo "Checking if key format is correct:"
          if ! grep -q "BEGIN OPENSSH PRIVATE KEY" ~/.ssh/id_ed25519; then
            echo "Key does not start with correct header"
          fi
          if ! grep -q "END OPENSSH PRIVATE KEY" ~/.ssh/id_ed25519; then
            echo "Key does not end with correct footer"
          fi
          
          echo "Checking known_hosts content:"
          cat ~/.ssh/known_hosts || true
          
          exit 1
        fi
        
        REMOTE_URL="ssh://${{ inputs.remote_user }}@${{ inputs.remote_host }}:${{ inputs.remote_port }}${{ inputs.remote_path }}"
        BRANCH="${{ inputs.branch }}"
        
        echo "Adding git remote..."
        git remote add destination "${REMOTE_URL}" || {
          echo "Error: Failed to add git remote"
          exit 1
        }
        
        echo "Pushing to remote repository (branch: ${BRANCH})..."
        GIT_SSH_COMMAND="ssh -v -i ~/.ssh/id_ed25519 -p ${{ inputs.remote_port }}" \
        git push destination "${BRANCH}" || {
          echo "Error: Failed to push to remote repository"
          exit 1
        }
        
        echo "Successfully pushed to custom repository"
      shell: bash