name: "push to custom repo"
description: "push to custom git repository"

inputs:
  remote_user:
    description: "remote username"
    required: true
  remote_host:
    description: "remote host"
    required: true
  remote_port:
    description: "remote ssh port"
    required: true
  remote_path:
    description: "remote repository path (should start with /)"
    required: true
  ssh_key:
    description: "ssh private key (supports RSA, ED25519, keep the newlines in the key)"
    required: true
  branch:
    description: "branch to push (defaults to current branch)"
    required: false
    default: ${GITHUB_REF##*/}

runs:
  using: "composite"
  steps:
    - name: push to custom repo
      run: |
        set -e
        set -o pipefail  # Ensure pipeline errors are caught
        
        cleanup() {
          echo "Cleaning up..."
          git remote remove destination 2>/dev/null || true
          rm -f ~/.ssh/id_key ~/.ssh/config ~/.ssh/known_hosts
        }
        
        trap cleanup EXIT  # Ensure cleanup runs on exit
        
        echo "Starting push to custom repository action..."
        
        # Validate inputs
        echo "Validating inputs..."
        if [[ ! "${{ inputs.remote_path }}" =~ ^/ ]]; then
          echo "Error: remote_path must start with /"
          exit 1
        fi
        
        # Validate port number
        echo "Validating port number..."
        if ! [[ "${{ inputs.remote_port }}" =~ ^[0-9]+$ ]] || \
           [ "${{ inputs.remote_port }}" -lt 1 ] || \
           [ "${{ inputs.remote_port }}" -gt 65535 ]; then
          echo "Error: Invalid port number"
          exit 1
        fi
        
        echo "Fetching repository history..."
        # Only do unshallow if repository is shallow
        if git rev-parse --is-shallow-repository | grep -q "true"; then
          git fetch --unshallow || true
        fi
        
        echo "Setting up SSH configuration..."
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        
        # Write SSH key to file
        echo "${{ inputs.ssh_key }}" > ~/.ssh/id_key
        chmod 600 ~/.ssh/id_key
        
        # Display key info for debugging (without showing the actual key)
        echo "Key file size: $(wc -c < ~/.ssh/id_key) bytes"
        echo "Key file first line: $(head -n 1 ~/.ssh/id_key | sed 's/\(.\{10\}\).*/\1.../')"
        
        # Create a minimal SSH config file
        cat > ~/.ssh/config << 'EOL'
        Host *
            StrictHostKeyChecking yes
            IdentitiesOnly yes
            BatchMode yes
        EOL
        chmod 600 ~/.ssh/config
        
        echo "Adding remote host to known hosts..."
        ssh-keyscan -p ${{ inputs.remote_port }} ${{ inputs.remote_host }} >> ~/.ssh/known_hosts || {
          echo "Error: Failed to scan remote host key"
          exit 1
        }
        chmod 600 ~/.ssh/known_hosts
        
        # Test SSH connection with more verbose output
        echo "Testing SSH connection..."
        if ! ssh -v -i ~/.ssh/id_key -p ${{ inputs.remote_port }} ${{ inputs.remote_user }}@${{ inputs.remote_host }} exit 2>&1; then
          echo "Error: Failed to establish SSH connection"
          echo "Trying to diagnose the issue..."
          
          echo "Checking SSH key fingerprint:"
          ssh-keygen -l -f ~/.ssh/id_key || true
          
          echo "Checking SSH version and configuration:"
          ssh -V
          
          echo "Checking known_hosts content:"
          cat ~/.ssh/known_hosts || true
          
          # Try with a different key format
          echo "Trying to convert key format..."
          cp ~/.ssh/id_key ~/.ssh/temp_key
          ssh-keygen -p -N "" -f ~/.ssh/temp_key || true
          
          echo "Trying connection with converted key:"
          ssh -v -i ~/.ssh/temp_key -p ${{ inputs.remote_port }} ${{ inputs.remote_user }}@${{ inputs.remote_host }} exit 2>&1 || true
          rm -f ~/.ssh/temp_key
          
          # Try with StrictHostKeyChecking=no for debugging
          echo "Trying connection with StrictHostKeyChecking=no (for debugging only):"
          ssh -v -i ~/.ssh/id_key -o StrictHostKeyChecking=no -p ${{ inputs.remote_port }} ${{ inputs.remote_user }}@${{ inputs.remote_host }} exit 2>&1 || true
          
          exit 1
        fi
        
        # Use a URL format that works with the SSH command line options
        REMOTE_URL="ssh://${{ inputs.remote_user }}@${{ inputs.remote_host }}:${{ inputs.remote_port }}${{ inputs.remote_path }}"
        BRANCH="${{ inputs.branch }}"
        
        echo "Adding git remote..."
        git remote add destination "${REMOTE_URL}" || {
          echo "Error: Failed to add git remote"
          exit 1
        }
        
        echo "Pushing to remote repository (branch: ${BRANCH})..."
        # Use GIT_SSH_COMMAND to ensure git uses the correct SSH configuration
        GIT_SSH_COMMAND="ssh -v -i ~/.ssh/id_key -p ${{ inputs.remote_port }}" \
        git push destination "${BRANCH}" || {
          echo "Error: Failed to push to remote repository"
          exit 1
        }
        
        echo "Successfully pushed to custom repository"
      shell: bash