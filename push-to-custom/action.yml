name: "push to custom repo"
description: "push to custom git repository"

inputs:
  remote_user:
    description: "remote username"
    required: true
  remote_host:
    description: "remote host"
    required: true
  remote_port:
    description: "remote ssh port"
    required: true
  remote_path:
    description: "remote repository path (should start with /)"
    required: true
  ssh_key:
    description: "ssh private key (supports RSA, ED25519, keep the newlines in the key)"
    required: true
  branch:
    description: "branch to push (defaults to current branch)"
    required: false
    default: ${GITHUB_REF##*/}

runs:
  using: "composite"
  steps:
    - name: push to custom repo
      run: |
        set -e
        set -o pipefail  # Ensure pipeline errors are caught
        
        cleanup() {
          echo "Cleaning up..."
          git remote remove destination 2>/dev/null || true
          rm -f ~/.ssh/id_key ~/.ssh/id_key.pub ~/.ssh/config ~/.ssh/known_hosts
        }
        
        trap cleanup EXIT  # Ensure cleanup runs on exit
        
        echo "Starting push to custom repository action..."
        
        # Validate inputs
        if [[ ! "${{ inputs.remote_path }}" =~ ^/ ]]; then
          echo "Error: remote_path must start with /"
          exit 1
        fi
        
        if ! [[ "${{ inputs.remote_port }}" =~ ^[0-9]+$ ]] || \
           [ "${{ inputs.remote_port }}" -lt 1 ] || \
           [ "${{ inputs.remote_port }}" -gt 65535 ]; then
          echo "Error: Invalid port number"
          exit 1
        fi
        
        # Fetch repository history if needed
        if git rev-parse --is-shallow-repository | grep -q "true"; then
          echo "Fetching repository history..."
          git fetch --unshallow || true
        fi
        
        echo "Setting up SSH configuration..."
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        
        # Write SSH key to file
        echo "${{ inputs.ssh_key }}" > ~/.ssh/id_key
        chmod 600 ~/.ssh/id_key
        
        # Try to extract public key from private key
        if ! ssh-keygen -y -f ~/.ssh/id_key > ~/.ssh/id_key.pub 2>/dev/null; then
          echo "Warning: Could not extract public key from private key"
          
          # Try to fix key format issues
          if ! grep -q "BEGIN" ~/.ssh/id_key; then
            echo "Attempting to fix key format..."
            cat ~/.ssh/id_key | base64 -d > ~/.ssh/id_key.tmp 2>/dev/null && mv ~/.ssh/id_key.tmp ~/.ssh/id_key
            chmod 600 ~/.ssh/id_key
          fi
          
          # Try to extract public key again
          if ! ssh-keygen -y -f ~/.ssh/id_key > ~/.ssh/id_key.pub 2>/dev/null; then
            echo "Error: Invalid SSH key format. Please provide a valid private key."
            exit 1
          fi
        fi
        
        # Create a minimal SSH config file
        cat > ~/.ssh/config << 'EOL'
        Host *
            StrictHostKeyChecking yes
            IdentitiesOnly yes
            BatchMode yes
        EOL
        chmod 600 ~/.ssh/config
        
        # Add remote host to known hosts
        ssh-keyscan -p ${{ inputs.remote_port }} ${{ inputs.remote_host }} >> ~/.ssh/known_hosts 2>/dev/null || {
          echo "Error: Failed to scan remote host key"
          exit 1
        }
        chmod 600 ~/.ssh/known_hosts
        
        # Test SSH connection
        echo "Testing SSH connection..."
        if ! ssh -i ~/.ssh/id_key -p ${{ inputs.remote_port }} ${{ inputs.remote_user }}@${{ inputs.remote_host }} exit 2>/dev/null; then
          echo "Error: Failed to establish SSH connection"
          echo "Please verify that:"
          echo "1. The SSH key is valid"
          echo "2. The public key is in authorized_keys on the server"
          echo "3. The server allows SSH connections on port ${{ inputs.remote_port }}"
          exit 1
        fi
        
        # Set up git remote and push
        REMOTE_URL="ssh://${{ inputs.remote_user }}@${{ inputs.remote_host }}:${{ inputs.remote_port }}${{ inputs.remote_path }}"
        BRANCH="${{ inputs.branch }}"
        
        echo "Adding git remote..."
        git remote add destination "${REMOTE_URL}" || {
          echo "Error: Failed to add git remote"
          exit 1
        }
        
        echo "Pushing to remote repository (branch: ${BRANCH})..."
        GIT_SSH_COMMAND="ssh -i ~/.ssh/id_key -p ${{ inputs.remote_port }}" \
        git push destination "${BRANCH}" || {
          echo "Error: Failed to push to remote repository"
          exit 1
        }
        
        echo "Successfully pushed to custom repository"
      shell: bash