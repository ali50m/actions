name: "my-upload-artifact"
description: "my proxy of calling actions/upload-artifact"
inputs:
  name:
    description: "artifact name"
    required: true
  path:
    description: "artifact path"
    required: true

runs:
  using: "composite"
  steps:
    - name: upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.name }}
        path: ${{ inputs.path }}

