name: "send weixin api message"
description: "send weixin api message on Linux and Windows"
inputs:
  weixin:
    description: "credential to call weixin API"
    required: true
  result:
    description: "main job result message"
    required: true
  now:
    description: "action begin time"
    required: true
  href:
    description: "filename url for web access"
    required: false

runs:
  using: "composite"
  steps:      
    - name: call API to send weixin (Linux)
      if: runner.os == 'Linux'
      shell: bash
      env:
        WEIXIN: ${{ inputs.weixin }}
        RESULT: ${{ inputs.result }}
        NOW: ${{ inputs.now }}
        HREF: ${{ inputs.href }}
        REPO: ${{ github.event.repository.name }}
        ACTOR: ${{ github.actor }}
      run: |
        set -euo pipefail

        ref="${GITHUB_REF##*/}"
        message=$(cat <<END
        ${REPO}/${ref}
        ${RESULT}_${NOW}${HREF}
        END
        )
        
        encrypted="U2FsdGVkX19xlWjV/OyDgsWs7SDdWQgw1Ghspe/65jTJxnzGgSv8/ECLajCWm9G3tSCdY9Yctx7YNekbz+R1eGd7G90nKrVpJFhemSZw3o4lyKSDgqtyptFKPEM75eqJmSRIc8N51Wt+C/YEP84GvA=="
        decrypted=$(printf '%s' "${encrypted}" | openssl aes-256-cbc -pbkdf2 -d -a -pass "pass:${WEIXIN}")
        echo "::add-mask::${decrypted}"

        token_response=$(curl -fsS "https://qyapi.weixin.qq.com/cgi-bin/gettoken?${decrypted}")
        token=$(printf '%s' "${token_response}" | jq --raw-output '.access_token // empty')
        if [[ -z "${token}" ]]; then
          errmsg=$(printf '%s' "${token_response}" | jq --raw-output '.errmsg // "missing access_token"')
          echo "获取 access_token 失败: ${errmsg}" >&2
          exit 1
        fi
        echo "::add-mask::${token}"
          
        url="https://qyapi.weixin.qq.com/cgi-bin/message/send?access_token=${token}"
        body=$(jq -n \
          --arg touser "${ACTOR}" \
          --arg content "${message}" \
          '{
            touser: $touser,
            msgtype: "text",
            agentid: 1000002,
            text: {
              content: $content
            }
          }')
        response=$(curl -fsS -H "Content-Type: application/json" -X POST "${url}" --data-raw "${body}")
        errcode=$(printf '%s' "${response}" | jq --raw-output '.errcode // -1')
        if [[ "${errcode}" != "0" ]]; then
          errmsg=$(printf '%s' "${response}" | jq --raw-output '.errmsg // "unknown error"')
          echo "发送消息失败: ${errmsg}" >&2
          exit 1
        fi
        
    - name: call API to send weixin (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      env:
        WEIXIN: ${{ inputs.weixin }}
        RESULT: ${{ inputs.result }}
        NOW: ${{ inputs.now }}
        HREF: ${{ inputs.href }}
        REPO: ${{ github.event.repository.name }}
        ACTOR: ${{ github.actor }}
      run: |
        $ref = $env:GITHUB_REF -replace '.*/'
        $message = @"
        ${env:REPO}/$ref
        ${env:RESULT}_${env:NOW}${env:HREF}
        "@.Trim()
        
        $encrypted = "U2FsdGVkX19xlWjV/OyDgsWs7SDdWQgw1Ghspe/65jTJxnzGgSv8/ECLajCWm9G3tSCdY9Yctx7YNekbz+R1eGd7G90nKrVpJFhemSZw3o4lyKSDgqtyptFKPEM75eqJmSRIc8N51Wt+C/YEP84GvA=="
        $decrypted = $encrypted | openssl aes-256-cbc -pbkdf2 -d -a -pass pass:"$env:WEIXIN"
        Write-Output "::add-mask::$decrypted"
        
        $tokenResponse = Invoke-RestMethod -Uri "https://qyapi.weixin.qq.com/cgi-bin/gettoken?$decrypted" -Method Get
        $token = $tokenResponse.access_token
        if ([string]::IsNullOrWhiteSpace($token)) {
          Write-Error "获取 access_token 失败: $($tokenResponse.errmsg)"
          exit 1
        }
        Write-Output "::add-mask::$token"
        
        $url = "https://qyapi.weixin.qq.com/cgi-bin/message/send?access_token=$token"
        $body = @{
          touser = $env:ACTOR
          msgtype = "text"
          agentid = 1000002
          text = @{
            content = $message
          }
        } | ConvertTo-Json -Compress
        
        try {
          $response = Invoke-RestMethod -Uri $url -Method Post -Headers @{"Content-Type" = "application/json"} -Body $body
          if ($response.errcode -ne 0) {
            Write-Error "发送消息失败: $($response.errmsg)"
            exit 1
          }
        }
        catch {
          Write-Error "请求失败: $_"
          exit 1
        }
